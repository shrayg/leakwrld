# fly.toml app configuration file generated for pornyard on 2026-03-21T17:19:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pornyard'
primary_region = 'iad'

[build]

[env]
  PORT = '3000'
  NODE_ENV = 'production'
  NODE_OPTIONS = '--max-old-space-size=768'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = '30s'
  interval = '15s'
  method = 'GET'
  timeout = '10s'
  path = '/api/health'
  restart_limit = 3

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
